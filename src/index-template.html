<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>pankaj-meghani.github.io // Developer Blog</title>
        <meta
            name="description"
            content="A development blog sharing coding projects, software architecture, technical write-ups, and developer learnings."
        />

        <!-- Open Graph -->
        <meta
            property="og:title"
            content="pankaj-meghani.github.io // Developer Blog"
        />
        <meta
            property="og:description"
            content="A development blog sharing coding projects, software architecture, technical write-ups, and developer learnings."
        />
        <meta property="og:type" content="website" />

        <!-- Styling -->
        <link rel="stylesheet" href="styles.css" />

        <!-- Theme Initialization (prevents flash of light theme) -->
        <script>
            const currentTheme = localStorage.getItem("theme") || "light";
            if (currentTheme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        </script>
    </head>
    <body>
        {{header}}

        <main>
            <section class="hero" aria-labelledby="hero-title">
                <h1 id="hero-title">Hey, I'm Pankaj</h1>
                <p>
                    Welcome to my dev blog! I primarily use this space to
                    document my coding journeys, share development tutorials,
                    and log lessons learned while building software.
                </p>
            </section>

            <section class="filter-container" aria-labelledby="filter-title">
                <h2 class="filter-title" id="filter-title">Filter by Topic</h2>
                <div class="tags-bar" id="tags-bar">
                    <button
                        class="tag-btn active"
                        data-tag="all"
                        id="tag-all-btn"
                    >
                        All Posts
                    </button>
                    {{tag_buttons}}
                </div>
            </section>

            <section aria-label="Blog posts list">
                <div class="posts-grid" id="posts-grid">{{posts}}</div>
            </section>
        </main>

        {{footer}}

        <script>
            // Client-side tag filtering logic
            document.addEventListener("DOMContentLoaded", () => {
                const tagButtons = document.querySelectorAll(".tag-btn");
                const postCards = document.querySelectorAll(".post-card");

                tagButtons.forEach((button) => {
                    button.addEventListener("click", () => {
                        const selectedTag = button.getAttribute("data-tag");

                        // Highlight the active button
                        tagButtons.forEach((btn) =>
                            btn.classList.remove("active"),
                        );
                        button.classList.add("active");

                        // Filter post cards
                        postCards.forEach((card) => {
                            const cardTags = card.getAttribute("data-tags")
                                ? card.getAttribute("data-tags").split(",")
                                : [];

                            if (
                                selectedTag === "all" ||
                                cardTags.includes(selectedTag)
                            ) {
                                card.classList.remove("hidden");
                                // Trigger slight fade-in animation
                                card.style.animation = "none";
                                card.offsetHeight; // Trigger reflow
                                card.style.animation = "fadeIn 0.5s ease-out";
                            } else {
                                card.classList.add("hidden");
                            }
                        });
                    });
                });

                // Theme Toggle Logic
                const themeToggle = document.getElementById("theme-toggle");
                const sunIcon = document.getElementById("theme-toggle-sun");
                const moonIcon = document.getElementById("theme-toggle-moon");

                function updateThemeUI(theme) {
                    if (theme === "dark") {
                        sunIcon.classList.remove("hidden");
                        moonIcon.classList.add("hidden");
                    } else {
                        sunIcon.classList.add("hidden");
                        moonIcon.classList.remove("hidden");
                    }
                }

                // Initial state update
                updateThemeUI(document.documentElement.getAttribute("data-theme") || "light");

                themeToggle.addEventListener("click", () => {
                    const currentTheme = document.documentElement.getAttribute("data-theme") || "light";
                    const newTheme = currentTheme === "dark" ? "light" : "dark";
                    document.documentElement.setAttribute("data-theme", newTheme);
                    localStorage.setItem("theme", newTheme);
                    updateThemeUI(newTheme);
                });
            });
        </script>
    </body>
</html>
